<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Redmine Pro - 登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#bdc2ff",
              "surface-container-low": "#1b1c1e",
              "surface-container-high": "#292a2c",
              "on-tertiary-fixed": "#2b1700",
              "on-primary": "#121f8b",
              "on-secondary-fixed": "#13183d",
              "on-secondary-fixed-variant": "#3f446b",
              "inverse-primary": "#4854bb",
              "surface-bright": "#38393b",
              "on-secondary-container": "#b1b5e3",
              "outline": "#908f9e",
              "on-primary-fixed-variant": "#2e3aa2",
              "surface-container": "#1f2022",
              "primary-container": "#5e6ad2",
              "surface-container-lowest": "#0d0e10",
              "on-error-container": "#ffdad6",
              "primary": "#bdc2ff",
              "secondary-fixed-dim": "#c0c3f2",
              "primary-fixed": "#dfe0ff",
              "outline-variant": "#454652",
              "tertiary-fixed": "#ffddbb",
              "inverse-on-surface": "#303033",
              "secondary-container": "#42466e",
              "on-secondary": "#292d53",
              "on-primary-container": "#fdfaff",
              "surface-container-highest": "#343537",
              "tertiary-fixed-dim": "#ffb867",
              "tertiary": "#ffb867",
              "on-tertiary": "#482900",
              "on-primary-fixed": "#000965",
              "on-tertiary-fixed-variant": "#673d00",
              "tertiary-container": "#a56500",
              "on-tertiary-container": "#fffaf8",
              "error": "#ffb4ab",
              "on-surface-variant": "#c6c5d5",
              "background": "#121315",
              "surface": "#121315",
              "surface-tint": "#bdc2ff",
              "error-container": "#93000a",
              "surface-dim": "#121315",
              "on-error": "#690005",
              "on-surface": "#e3e2e4",
              "surface-variant": "#343537",
              "secondary-fixed": "#dfe0ff",
              "secondary": "#c0c3f2",
              "inverse-surface": "#e3e2e4",
              "on-background": "#e3e2e4"
            },
            fontFamily: {
              "headline": ["Inter", "PingFang SC"],
              "body": ["Inter", "PingFang SC"],
              "label": ["Inter", "PingFang SC"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      body {
        background-color: #0e0f11;
        color: #e3e2e4;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(31, 32, 34, 0.7);
        backdrop-filter: blur(20px);
      }
      .input-inset {
        background-color: #0d0e10;
        box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
      }
    </style>
</head>
<body class="font-body selection:bg-primary/30 selection:text-primary">
<div class="min-h-screen flex flex-col items-center justify-center p-6 bg-[#0E0F11]">
<div class="w-full max-w-[440px] space-y-8">
<div class="flex flex-col items-center space-y-3">
<div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-2xl" style="font-variation-settings: 'FILL' 1;">architecture</span>
</div>
<div class="text-center">
<h1 class="text-2xl font-bold tracking-tight text-on-surface">Redmine Pro</h1>
<p class="text-sm text-on-surface-variant mt-1">The Monolith Architect</p>
</div>
</div>
<div class="glass-card p-8 rounded-xl border border-outline-variant/10">
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-widest" for="url">实例 URL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">link</span>
<input class="w-full h-11 pl-10 pr-4 rounded-lg input-inset border-none text-sm text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/40 transition-all" id="url" placeholder="https://redmine.rd.virsical.cn" type="url"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-widest" for="api-key">个人 API 密钥</label>
<a class="text-[10px] text-primary hover:text-primary-fixed-dim transition-colors uppercase tracking-widest font-semibold" href="#">获取密钥</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">key</span>
<input class="w-full h-11 pl-10 pr-10 rounded-lg input-inset border-none text-sm text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/40 transition-all" id="api-key" placeholder="••••••••••••••••••••••••••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<div class="flex items-center space-x-2 py-1">
<input class="w-4 h-4 rounded bg-surface-container-lowest border-outline-variant text-primary focus:ring-0 focus:ring-offset-0" id="remember" type="checkbox"/>
<label class="text-xs text-on-surface-variant cursor-pointer select-none" for="remember">记住此实例</label>
</div>
<button class="w-full h-11 bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-semibold rounded-lg text-sm shadow-lg shadow-primary-container/10 transition-all active:scale-[0.98] flex items-center justify-center space-x-2" type="submit">
<span>连接账户</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
</div>
<div class="flex flex-col items-center space-y-6 pt-4">
<div class="flex items-center space-x-4">
<div class="h-[1px] w-8 bg-outline-variant/20"></div>
<span class="text-[10px] uppercase tracking-widest text-outline/50">Security Encrypted</span>
<div class="h-[1px] w-8 bg-outline-variant/20"></div>
</div>
<p class="text-[10px] font-mono text-outline/40 uppercase tracking-[0.2em]">
                    v2.4.0-stable | Connected to redmine.internal
                </p>
</div>
</div>
</div>
<div class="fixed bottom-0 left-0 w-full overflow-hidden pointer-events-none opacity-20 h-64">
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[150%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[150%] bg-primary-container/10 blur-[120px] rounded-full"></div>
</div>
</body></html>
